<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Live Stream</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        video { max-width: 100%; max-height: 100vh; }
        #status { position: fixed; top: 10px; left: 10px; color: #fff; font-family: monospace; font-size: 14px; }
        #debug { position: fixed; bottom: 10px; left: 10px; color: #0f0; font-family: monospace; font-size: 12px; max-height: 200px; overflow-y: auto; white-space: pre; }
    </style>
</head>
<body>
    <div id="status">Connecting...</div>
    <video id="video" controls autoplay muted></video>
    <div id="debug"></div>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');
        const src = '/live/stream.m3u8';

        if (Hls.isSupported()) {
            const dbg = document.getElementById('debug');
            const log = (msg) => {
                const ts = new Date().toISOString().substr(11, 12);
                dbg.textContent += ts + ' ' + msg + '\n';
                if (dbg.childNodes.length > 50) {
                    dbg.textContent = dbg.textContent.split('\n').slice(-30).join('\n');
                }
                dbg.scrollTop = dbg.scrollHeight;
            };

            const hls = new Hls({
                liveSyncDurationCount: 3,
                liveMaxLatencyDurationCount: 6,
                debug: false,
            });
            hls.loadSource(src);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                status.textContent = 'Live';
                video.play();
            });
            hls.on(Hls.Events.FRAG_LOADED, (e, data) => {
                log('FRAG_LOADED sn=' + data.frag.sn + ' dur=' + data.frag.duration.toFixed(3));
            });
            hls.on(Hls.Events.FRAG_CHANGED, (e, data) => {
                log('FRAG_CHANGED sn=' + data.frag.sn + ' start=' + data.frag.start.toFixed(3));
            });
            hls.on(Hls.Events.LEVEL_UPDATED, (e, data) => {
                const d = data.details;
                log('LEVEL_UPDATED seq=' + d.startSN + '-' + d.endSN + ' live=' + d.live);
            });
            hls.on(Hls.Events.ERROR, (event, data) => {
                log('ERROR ' + data.type + ' ' + data.details + (data.fatal ? ' FATAL' : ''));
                if (data.fatal) {
                    status.textContent = 'Error: ' + data.type;
                    if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                        setTimeout(() => hls.loadSource(src), 3000);
                        status.textContent = 'Reconnecting...';
                    }
                }
            });
            video.addEventListener('seeking', () => log('SEEKING to=' + video.currentTime.toFixed(3)));
            video.addEventListener('seeked', () => log('SEEKED at=' + video.currentTime.toFixed(3)));
            video.addEventListener('waiting', () => log('WAITING (buffer stall)'));
            video.addEventListener('stalled', () => log('STALLED'));
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = src;
            video.addEventListener('loadedmetadata', () => {
                status.textContent = 'Live';
                video.play();
            });
        }
    </script>
</body>
</html>
